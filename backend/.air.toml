root = "."
tmp_dir = "/tmp/air"

[build]
  cmd = "go build -o /tmp/air/server ./cmd/api"
  bin = "/tmp/air/server"
  full_bin = "/tmp/air/server"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["vendor", "testdata"]
  exclude_regex = ["_test\\.go$"]
  delay = 1000
  stop_on_error = true
  log = "air_build.log"

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

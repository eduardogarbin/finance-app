worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Desabilita buffering globalmente para suportar SSE (Server-Sent Events).
    # Sem isso, o Nginx acumularia os chunks do stream antes de enviar ao cliente,
    # quebrando a natureza em tempo real do SSE.
    proxy_buffering off;
    proxy_cache     off;

    upstream app_backend {
        server app:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Rota principal — todas as requisicoes vao para o backend Go
        location / {
            proxy_pass         http://app_backend;
            proxy_http_version 1.1;

            # Necessario para SSE: mantem a conexao HTTP persistente (chunked transfer)
            proxy_set_header Connection '';

            # Headers padrao de proxy reverso
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Desabilita buffering nesta location tambem (sobrescreve o global)
            proxy_buffering      off;
            proxy_cache          off;

            # Header que instrui o Nginx a nao bufferizar (usado pelo X-Accel-Buffering)
            add_header X-Accel-Buffering no;

            # Timeouts longos para conexoes SSE de longa duracao
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
            proxy_connect_timeout 10s;
        }
    }
}
